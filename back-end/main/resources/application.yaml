spring:
  application:
    name: desertflower

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=DESERT_ROSE;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update   # dev thì dùng update, production nên dùng validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

server:
  port: 8080

